services:
  - type: web
    name: shopnest-backend
    runtime: python
    region: singapore
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: python3 -m uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
