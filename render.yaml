services:
  - type: web
    name: shopnest-backend
    runtime: python
    pythonVersion: 3.11
    region: singapore
    rootDir: Backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false